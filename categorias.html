<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineMax+ | Explorar por Categorías</title>
  <meta name="google-site-verification" content="BsDmgaYzTU7Gg_qmrTERyoId3iPY56erl15vO3F1LJI" />
  <meta name="theme-color" content="#f5c518">

  <link rel="icon" type="image/png" href="Icon-192.png">
  <link rel="apple-touch-icon" href="Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* ════════════════════════════════════════
       BASE (Copy of index.html styles)
    ════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #f5c518; --dark: #000; --bg: #000; --bg2: #0a0a0a;
      --card: #111; --card2: #1a1a1a; --txt: #fff; --muted: #94a3b8;
      --dim: #4b5563; --border: rgba(245,197,24,0.12); --r: 10px;
    }
    body { background: #000000; color: var(--txt); font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; background: #111; }
    ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }

    #mainHeader { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.97); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(245,197,24,0.15); z-index: 500; display: flex; align-items: center; }
    .hdr { max-width: 1440px; margin: 0 auto; padding: 0 1.5rem; width: 100%; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; }
    .logo span { color: var(--blue); }
    .nav-items { display: flex; gap: 1.2rem; }
    .nav-items a { color: rgba(255,255,255,0.72); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
    .nav-items a:hover { color: #fff; }

    .hero-mini { padding: 120px 1.5rem 50px; background: #000 url('hero-bg.png') no-repeat center center / cover; text-align: center; border-bottom: 2px solid var(--blue); position: relative; }
    .hero-mini::before { content: ''; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7); pointer-events: none; }
    .hero-mini h1 { position: relative; z-index: 1; font-size: 2.22rem; font-weight: 900; }

    .content { max-width: 1440px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
    .cat-tabs { display: flex; gap: 0.8rem; overflow-x: auto; padding-bottom: 2rem; scrollbar-width: none; }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab { padding: 10px 24px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--muted); cursor: pointer; white-space: nowrap; font-weight: 600; font-size: 0.88rem; transition: all 0.2s; }
    .cat-tab.active { background: var(--blue); color: #000; border-color: var(--blue); transform: scale(1.05); }

    .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem 1.2rem; }
    
    /* Movie Card Style */
    .movie-card { width: 100%; cursor: pointer; transition: transform 0.22s; }
    .movie-card:hover { transform: translateY(-6px); }
    .card-img-wrap { aspect-ratio: 2/3; border-radius: var(--r); overflow: hidden; background: var(--card); border: 1px solid var(--border); position: relative; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .card-name { font-size: 0.85rem; font-weight: 600; margin-top: 10px; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Detail / Player Modals same as index */
    #detailPanel { position: fixed; inset: 0; z-index: 600; background: var(--bg); transform: translateX(100%); transition: transform 0.35s ease-in-out; overflow-y: auto; }
    #detailPanel.open { transform: translateX(0); }
    .dp-hero { height: 350px; background: #111 no-repeat center/cover; position: relative; }
    .dp-inner { max-width: 1200px; margin: -60px auto 0; padding: 0 1.5rem 4rem; position: relative; z-index: 2; }
    .dp-back-btn { position: fixed; top: 75px; left: 20px; z-index:100; padding: 10px; border-radius: 50%; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); color:#fff; cursor:pointer;}
    
    #playerModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
    #playerModal.open { display: flex; }
    .player-box { width: 100%; max-width: 1100px; }
    .player-frame { aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; }

    footer { background: #000; padding: 3rem 1.5rem; border-top: 1px solid var(--border); text-align: center; }
    .loader { display: flex; justify-content: center; padding: 5rem; width: 100%; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,217,0,0.1); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header id="mainHeader">
  <div class="hdr">
    <a href="index.html" class="logo">Cine<span>Max+</span></a>
    <nav class="nav-items">
      <a href="index.html">Inicio</a>
      <a href="series.html">Series</a>
      <a href="categorias.html" style="color:var(--blue)">Categorías</a>
    </nav>
  </div>
</header>

<section class="hero-mini">
  <h1 id="catTitle">Explorar por <span>Categorías</span></h1>
</section>

<div class="content">
  <div class="cat-tabs" id="catTabs"><div class="spinner"></div></div>
  <div class="grid-layout" id="catGrid">
    <div class="loader"><div class="spinner"></div></div>
  </div>
</div>

<footer>
  <a href="index.html" class="logo">Cine<span>Max+</span></a>
  <p style="color:var(--dim);margin-top:1rem;">&copy; 2025 CineMax+. Todo el cine en tus manos.</p>
</footer>

<div id="detailPanel">
  <button class="dp-back-btn" onclick="closeDetail()"><i class="fas fa-arrow-left"></i></button>
  <div id="dpContent"></div>
</div>

<div id="playerModal">
  <div class="player-box">
    <div class="player-hdr" style="display:flex;justify-content:space-between;margin-bottom:1rem;">
      <h3 id="playerTitle"></h3>
      <button onclick="closePlayer()" style="background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;">&times;</button>
    </div>
    <div class="player-frame"><iframe id="mainPlayer" src="" style="width:100%;height:100%;border:none;" allow="autoplay; fullscreen"></iframe></div>
  </div>
</div>

<!-- NODOS OCULTOS -->
<div style="display:none;">
    <div id="trendingMovies"></div><div id="estrenosMovies"></div><div id="seriesRow"></div><div id="catalogGrid"></div><div id="recentMovies"></div>
    <div id="heroSection"></div><div id="heroTitle"></div><div id="heroDescription"></div>
    <button id="heroWatchBtn"></button><button id="heroDetailsBtn"></button><button id="mobileMenuBtn"></button>
    <div id="navLinks"></div><div id="allSeriesGrid"></div><div id="mainSeriesContent"></div>
    <div id="movieModalBody"></div><div id="videoModalTitle"></div><button id="closeVideoModal"></button><button id="closeMovieModal"></button>
    <div id="videoPlayer"></div><div id="tendencias"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script type="module" src="app.js"></script>

<script>
  let currentCat = 'Acción';

  window.addEventListener('contentLoaded', () => { renderCategories(); });

  function renderCategories() {
    const tabs = document.getElementById('catTabs');
    const genres = Array.from(allGenres).sort();
    if (!genres.length) { setTimeout(renderCategories, 500); return; }
    
    tabs.innerHTML = genres.map(g => `<button class="cat-tab ${g===currentCat?'active':''}" onclick="selectCat('${g}')">${g}</button>`).join('');
    selectCat(currentCat || genres[0]);
  }

  window.selectCat = (cat) => {
    currentCat = cat;
    document.getElementById('catTitle').innerHTML = `Género: <span>${cat}</span>`;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.innerText === cat));
    
    const grid = document.getElementById('catGrid');
    const filtered = allMovies.filter(m => m.categorias && m.categorias.includes(cat));
    
    grid.innerHTML = '';
    if (!filtered.length) { grid.innerHTML = '<p>No hay contenido en esta categoría.</p>'; return; }
    
    filtered.forEach(m => grid.appendChild(createMovieCard(m)));
  };

  /* Detail Panel (simplified index version) */
  window.openDetail = async (movie) => {
    const p = document.getElementById('detailPanel');
    const c = document.getElementById('dpContent');
    p.classList.add('open'); document.body.style.overflow='hidden';
    c.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    
    let tmdb = null;
    if (movie.tmdb_id && window.TMDB_API_KEY) {
      try {
        const r = await fetch(`https://api.themoviedb.org/3/${movie.tipo==='serie'?'tv':'movie'}/${movie.tmdb_id}?api_key=${window.TMDB_API_KEY}&language=es-ES`);
        if (r.ok) tmdb = await r.json();
      } catch(e) {}
    }

    const title = tmdb?.name || tmdb?.title || movie.titulo;
    const banner = window.fixImageUrl(tmdb?.backdrop_path || movie.fondo, 'original');
    const poster = window.fixImageUrl(tmdb?.poster_path || movie.poster, 'w500');

    c.innerHTML = `
      <div class="dp-hero" style="background-image:url('${banner}')"></div>
      <div class="dp-inner">
        <div style="display:flex;gap:2rem;margin-top:-100px;">
          <img src="${poster}" style="width:180px;border-radius:12px;box-shadow:0 10px 30px #000;border:2px solid rgba(255,255,255,0.1);">
          <div style="margin-top:110px;">
            <h1 style="font-size:2.5rem;">${title}</h1>
            <p style="color:var(--muted);margin-top:1rem;line-height:1.6;">${tmdb?.overview || movie.sinopsis}</p>
            <div style="margin-top:2rem;">
               <button onclick="playVideo('${movie.url || movie.español}','${title.replace(/'/g,"\\'")}','')" style="padding:12px 30px;background:var(--blue);border:none;border-radius:30px;font-weight:700;cursor:pointer;"><i class="fas fa-play"></i> Ver Ahora</button>
            </div>
          </div>
        </div>
      </div>`;
  };

  window.closeDetail = () => { document.getElementById('detailPanel').classList.remove('open'); document.body.style.overflow=''; };
  window.playVideo = (u, t) => { if(!u)return; document.getElementById('playerTitle').innerText=t; document.getElementById('mainPlayer').src=u; document.getElementById('playerModal').classList.add('open'); };
  window.closePlayer = () => { document.getElementById('playerModal').classList.remove('open'); document.getElementById('mainPlayer').src=''; };

  const checkInt = setInterval(() => { if(typeof allMovies !== 'undefined' && allMovies.length > 0) { renderCategories(); clearInterval(checkInt); } }, 500);
</script>
</body>
</html>

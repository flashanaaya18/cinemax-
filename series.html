<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineMax+ | Todas las Series</title>
  <meta name="description" content="Explora nuestro catálogo completo de series en HD. Calidad premium y streaming fluido.">
  <meta name="theme-color" content="#f5c518">
  <link rel="icon" type="image/png" href="Icon-192.png">
  <link rel="apple-touch-icon" href="Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* ════════════════════════════════════════
       BASE (Copy of index.html styles)
    ════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:  #f5c518;
      --green: #21d07a;
      --txt:   #ffffff;
      --muted: #94a3b8;
      --dim:   #4b5563;
      --border: rgba(245,197,24,0.15);
      --r: 10px;
      --card:  #111111;
      --card2: #1a1a1a;
      --bg:    #000000;
      --bg2:   #0a0a0a;
    }

    html { scroll-behavior: smooth; }
    body {
      background: #000000;
      color: var(--txt);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }
    ::-webkit-scrollbar-track { background: #111; }

    /* ════════════════════════════════════════
       HEADER
    ════════════════════════════════════════ */
    #mainHeader {
      position: fixed; top: 0; left: 0; width: 100%; height: 70px;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(245, 197, 24, 0.15);
      z-index: 500;
      display: flex; align-items: center;
      transition: all 0.3s ease;
    }
    .hdr {
      max-width: 1440px; margin: 0 auto; padding: 0 1.5rem;
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; gap: 1rem;
    }
    .left-hdr { display: flex; align-items: center; gap: 0.8rem; }
    .logo { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; letter-spacing: -0.5px; }
    .logo span { color: var(--blue); }
    .nav-items { display: flex; gap: 1.2rem; margin-left: 1.5rem; }
    .nav-items a { color: rgba(255,255,255,0.72); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .nav-items a:hover { color: #fff; }

    .search-wrap {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(245, 197, 24, 0.2);
      border-radius: 24px; padding: 7px 16px;
      transition: all 0.2s;
    }
    .search-wrap:focus-within { border-color: var(--blue); background: rgba(255,255,255,0.11); box-shadow: 0 0 0 3px rgba(245,197,24,0.15); }
    .search-wrap i { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    #searchInput { background: none; border: none; outline: none; color: #fff; font-family: 'Outfit', sans-serif; font-size: 0.88rem; width: 185px; }

    /* ════════════════════════════════════════
       MAIN LAYOUT
    ════════════════════════════════════════ */
    .hero-mini {
      padding: 120px 1.5rem 50px;
      background: #000 url('hero-bg.png') no-repeat center center / cover;
      text-align: center;
      border-bottom: 2px solid var(--blue);
      position: relative;
    }
    .hero-mini::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      pointer-events: none;
      z-index: 0;
    }
    .hero-mini h1, .hero-mini p {
      position: relative;
      z-index: 1;
    }
    .hero-mini h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; }
    .hero-mini p { color: var(--muted); font-size: 1rem; }

    .content { max-width: 1440px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

    /* Grid layout */
    .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem 1.2rem; }
    
    .movie-card { flex-shrink: 0; width: 100%; cursor: pointer; transition: transform 0.22s ease; }
    .movie-card:hover { transform: translateY(-6px); }
    .card-img-wrap {
      width: 100%; aspect-ratio: 2/3; border-radius: var(--r);
      overflow: hidden; background: var(--card);
      position: relative; box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
    }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s ease; }
    .movie-card:hover .card-img-wrap img { transform: scale(1.07); }
    .card-hover-layer { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 55%); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.25s; }
    .movie-card:hover .card-hover-layer { opacity: 1; }
    .play-circle { width: 44px; height: 44px; border-radius: 50%; background: var(--blue); color: #000; display: flex; align-items: center; justify-content: center; font-size: 1rem; box-shadow: 0 0 24px rgba(245,197,24,0.4); transform: scale(0.8); transition: transform 0.22s; }
    .movie-card:hover .play-circle { transform: scale(1); }
    .score-dot { position: absolute; bottom: -12px; left: 8px; width: 32px; height: 32px; border-radius: 50%; background: #111; border: 2px solid var(--green); display: flex; align-items: center; justify-content: center; font-size: 0.58rem; font-weight: 800; z-index: 4; color: #fff; }
    .card-body { padding: 1rem 0 0.2rem; }
    .card-name { font-size: 0.85rem; font-weight: 600; line-height: 1.3; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-year { font-size: 0.75rem; color: var(--dim); margin-top: 3px; }

    /* Detail Panel */
    #detailPanel { position: fixed; inset: 0; z-index: 600; background: var(--bg); transform: translateX(100%); transition: transform 0.38s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; overflow-x: hidden; }
    #detailPanel.open { transform: translateX(0); }
    .dp-hero { width: 100%; height: clamp(240px, 38vw, 460px); background: var(--card) no-repeat center / cover; position: relative; }
    .dp-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 0%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.15) 100%); }
    .dp-back-btn { position: absolute; top: 68px; left: 1.2rem; z-index: 10; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); transition: all 0.2s; }
    .dp-back-btn:hover { background: var(--blue); color: #000; }
    .dp-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 4rem; }
    .dp-top { display: grid; grid-template-columns: 165px 1fr; gap: 1.8rem; margin-top: -75px; position: relative; z-index: 2; }
    .dp-poster { width: 165px; border-radius: 12px; border: 3px solid rgba(255,255,255,0.1); box-shadow: 0 14px 42px rgba(0,0,0,0.65); background: var(--card); }
    .dp-title { font-size: clamp(1.5rem, 3.5vw, 2.2rem); font-weight: 900; margin-bottom: 0.35rem; }
    .dp-overview { color: var(--muted); font-size: 0.95rem; line-height: 1.7; margin-top: 1.5rem; }

    /* Seasons */
    .seasons-area { margin-top: 2rem; }
    .s-tabs { display: flex; gap: 0.6rem; overflow-x: auto; padding-bottom: 1rem; }
    .s-tab { padding: 10px 22px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); color: var(--muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .s-tab.active { background: var(--blue); color: #000; border-color: var(--blue); }
    .eps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 1.5rem; margin-top: 1.5rem; }
    .ep-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: all 0.25s; }
    .ep-card:hover { border-color: var(--blue); transform: translateY(-3px); }
    .ep-thumb { position: relative; aspect-ratio: 16/9; background: var(--card2); }
    .ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .ep-body { padding: 1rem; }
    .ep-title { font-size: 0.9rem; font-weight: 700; color: #fff; }

    /* Player Modal */
    #playerModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
    #playerModal.open { display: flex; }
    .player-box { width: 100%; max-width: 1100px; }
    .player-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .player-close { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 1.2rem; cursor: pointer; }
    .player-frame { aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
    #mainPlayer { width: 100%; height: 100%; border: none; }

    /* Loader */
    .loader { display: flex; justify-content: center; padding: 5rem; width: 100%; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,217,0,0.1); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { background: #000; padding: 3rem 1.5rem; border-top: 1px solid var(--border); text-align: center; }
    .ft-copy { color: var(--dim); font-size: 0.85rem; margin-top: 1rem; }

    @media (max-width: 768px) {
      .dp-top { grid-template-columns: 130px 1fr; gap: 1rem; }
      .dp-poster { width: 130px; }
      .eps-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header id="mainHeader">
  <div class="hdr">
    <div class="left-hdr">
      <a href="index.html" class="logo">Cine<span>Max+</span></a>
      <nav class="nav-items">
        <a href="descargar.html" class="btn-main"
          style="padding: 7px 15px; background: var(--blue); color: #000; border-radius: 20px; text-decoration: none; font-weight: 700; font-size: 0.9rem;"><i
            class="fas fa-download"></i> Instalar App</a>
      </nav>
    </div>
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar series..." autocomplete="off">
    </div>
  </div>
</header>

<section class="hero-mini">
  <h1>Catálogo de <span>Series</span></h1>
  <p>Explora temporadas completas con la mejor calidad premium.</p>
  <div class="stats-row" style="display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-top: 1.5rem;">
    <div class="stat-chip" style="background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 50px; padding: 7px 18px; display: flex; align-items: center; gap: 7px; font-size: 0.82rem; font-weight: 600;"><i class="fas fa-film" style="color:var(--blue)"></i> <span id="statMovies">—</span> Películas</div>
    <div class="stat-chip" style="background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 50px; padding: 7px 18px; display: flex; align-items: center; gap: 7px; font-size: 0.82rem; font-weight: 600;"><i class="fas fa-tv" style="color:var(--blue)"></i> <span id="statSeries">—</span> Series</div>
  </div>
</section>

<div class="content">
  <div class="grid-layout" id="allSeriesGrid">
    <div class="loader"><div class="spinner"></div></div>
  </div>
</div>

<footer>
  <a href="index.html" class="logo" style="text-decoration:none;">Cine<span>Max+</span></a>
  <p class="ft-copy">&copy; 2025 CineMax+. Todas las series en un solo lugar.</p>
</footer>

<!-- Detail Panel -->
<div id="detailPanel">
  <button class="dp-back-btn" onclick="closeDetail()"><i class="fas fa-arrow-left"></i></button>
  <div id="dpContent"></div>
</div>

<!-- NODOS OCULTOS PARA app.js -->
<div style="display:none;">
  <div id="trendingMovies"></div>
  <div id="estrenosMovies"></div>
  <div id="seriesRow"></div>
  <div id="catalogGrid"></div>
  <div id="recentMovies"></div>
  <div id="heroSection"></div>
  <div id="heroTitle"></div>
  <div id="heroDescription"></div>
  <button id="heroWatchBtn"></button>
  <button id="heroDetailsBtn"></button>
  <button id="mobileMenuBtn"></button>
  <div id="navLinks"></div>
  <div id="movieModalBody"></div>
  <div id="videoPlayer"></div>
  <div id="videoModalTitle"></div>
  <button id="closeVideoModal"></button>
  <button id="closeMovieModal"></button>
  <div id="tendencias"></div>
</div>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script type="module" src="app.js"></script>

<script>
  /* Filtro automático para series */
  window.addEventListener('contentLoaded', () => {
    if (typeof window.displayCatalog === 'function') {
      // Filtrar por series al cargar
      window.filterCatalog('serie');
    }
  });

  // Actualizar estadísticas globales (Landing style)
  window.updateStats = function(m, s) {
    const movieEl = document.getElementById('statMovies');
    const seriesEl = document.getElementById('statSeries');
    if (movieEl) movieEl.textContent = m;
    if (seriesEl) seriesEl.textContent = s;
  };

  // Sobrescribir renderizado para que use #allSeriesGrid
  const originalDisplay = window.displayCatalog;
  window.displayCatalog = function(filter = 'all') {
    const grid = document.getElementById('allSeriesGrid');
    if (!grid) return;
    grid.innerHTML = '';
    
    const list = filter === 'all' ? allMovies : allMovies.filter(m => m.tipo === filter);
    const seriesIdx = list.filter(m => m.tipo === 'serie');

    if (seriesIdx.length === 0) {
      grid.innerHTML = '<div class="empty-msg"><p>No se encontraron series.</p></div>';
      return;
    }

    seriesIdx.forEach(movie => {
      const card = createMovieCard(movie);
      grid.appendChild(card);
    });
  };

  /* Detail Panel Logic (Landing Version) */
  window.openDetail = async function(movie) {
    const panel = document.getElementById('detailPanel');
    const content = document.getElementById('dpContent');
    panel.classList.add('open');
    document.body.style.overflow = 'hidden';
    content.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    
    window.currentMovieData = movie;
    
    try {
      const isSerie = movie.tipo === 'serie';
      const mtype = isSerie ? 'tv' : 'movie';
      let tmdb = null;

      if (movie.tmdb_id && window.TMDB_API_KEY) {
        const r = await fetch(`https://api.themoviedb.org/3/${mtype}/${movie.tmdb_id}?api_key=${window.TMDB_API_KEY}&language=es-ES&append_to_response=credits`);
        if (r.ok) tmdb = await r.json();
      }

      let seasonsData = null;
      if (isSerie) {
        const rtdbPaths = [`series/${movie.id}`, `peliculas/${movie.id}`, `series-firestore/${movie.id}`, movie.id];
        for (const path of rtdbPaths) {
          try {
            const snap = await window.rtdb.ref(path).once('value');
            if (snap.exists() && snap.val().temporadas) { seasonsData = snap.val().temporadas; break; }
          } catch(_) {}
        }
      }

      const title = tmdb?.name || movie.titulo;
      const overview = tmdb?.overview || movie.sinopsis || 'Sin descripción disponible.';
      const banner = window.fixImageUrl(tmdb?.backdrop_path || movie.fondo || movie.poster, 'original');
      const poster = window.fixImageUrl(tmdb?.poster_path || movie.poster, 'w500');
      const year = (tmdb?.first_air_date || '').slice(0, 4) || movie.año || '';
      const numSeas = tmdb?.number_of_seasons || movie.temporadas || (seasonsData ? Object.keys(seasonsData).length : 1);
      const episodesCount = tmdb?.number_of_episodes || (seasonsData ? Object.values(seasonsData).reduce((total, s) => total + (s.episodios ? Object.keys(s.episodios).length : 0), 0) : 0);

      const watchHtml = `
        <div style="margin-top:2rem;">
          <a href="descargar.html" class="btn-main" style="width:100%; justify-content:center; padding:15px; font-size:1.1rem; border-radius:12px; background: linear-gradient(to right, #f5c518, #ff9800); color:#000; text-decoration:none; display:flex; align-items:center; gap:10px; font-weight:700;">
            <i class="fas fa-download"></i> INSTALAR APP PARA VER
          </a>
          <p style="font-size: 0.75rem; color: var(--dim); margin-top: 10px; text-align: center;">Versión Premium disponible solo en Android</p>
        </div>
      `;

      const seasonsHtml = `
        <div style="margin-top:2rem; padding:1.5rem; background:rgba(255,255,255,0.03); border-radius:12px; border:1px solid var(--border); display:flex; gap:2rem; align-items:center;">
          <div style="text-align:center; flex:1;">
            <div style="font-size:1.8rem; font-weight:900; color:var(--blue);">${numSeas}</div>
            <div style="font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Temporadas</div>
          </div>
          <div style="width:1px; height:40px; background:var(--border);"></div>
          <div style="text-align:center; flex:1;">
            <div style="font-size:1.8rem; font-weight:900; color:var(--blue);">${episodesCount || (numSeas * 10) + '+'}</div>
            <div style="font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Episodios</div>
          </div>
        </div>`;

      const appFeaturesHtml = `
        <div class="app-features-box" style="margin-top:2.5rem; padding:2rem; background:linear-gradient(135deg, rgba(245,197,24,0.1), transparent); border-radius:15px; border:1px solid rgba(245,197,24,0.2);">
          <p class="dp-label" style="color:var(--blue); font-size:1.1rem; font-weight:700; margin-bottom:0.5rem;"><i class="fas fa-mobile-alt"></i> La experiencia CineMax+ App</p>
          <p style="font-size:0.85rem; color:var(--muted); margin-bottom:1.5rem;">Descarga la aplicación oficial para acceder a funciones premium exclusivas y disfrutar sin límites.</p>
          <ul style="list-style:none; display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:15px; padding:0;">
            <li style="font-size:0.88rem; color:var(--txt); display:flex; align-items:center; gap:10px;"><i class="fas fa-check-circle" style="color:var(--blue);"></i> <b>Calidad Ultra HD y 4K</b></li>
            <li style="font-size:0.88rem; color:var(--txt); display:flex; align-items:center; gap:10px;"><i class="fas fa-check-circle" style="color:var(--blue);"></i> <b>Descargas Offline</b></li>
            <li style="font-size:0.88rem; color:var(--txt); display:flex; align-items:center; gap:10px;"><i class="fas fa-check-circle" style="color:var(--blue);"></i> <b>Transmisión a Chromecast</b></li>
            <li style="font-size:0.88rem; color:var(--txt); display:flex; align-items:center; gap:10px;"><i class="fas fa-check-circle" style="color:var(--blue);"></i> <b>Sin publicidad molesta</b></li>
          </ul>
        </div>`;

      content.innerHTML = `
        <div class="dp-hero" style="background-image:url('${banner}')"></div>
        <div class="dp-inner">
          <div class="dp-top">
            <img class="dp-poster" src="${poster}" alt="${title}">
            <div class="meta">
              <h1 class="dp-title">${title} ${year ? `<span style="font-weight:400;color:var(--muted);font-size:1.4rem;">(${year})</span>` : ''}</h1>
              <div class="dp-overview">${overview}</div>
              ${seasonsHtml}
              ${watchHtml}
              ${appFeaturesHtml}
            </div>
          </div>
        </div>`;

    } catch(e) { 
      console.error(e); 
      content.innerHTML = '<p style="padding:2rem;text-align:center;">Error al cargar. Intente de nuevo.</p>';
    }
  };

  window.closeDetail = () => { 
    document.getElementById('detailPanel').classList.remove('open'); 
    document.body.style.overflow = ''; 
  };

  // Trigger load
  const checkInterval = setInterval(() => {
    if (typeof allMovies !== 'undefined' && allMovies.length > 0) {
      window.displayCatalog('serie');
      clearInterval(checkInterval);
    }
  }, 500);
</script>
</body>
</html>
